name: 'fhir_analytics'
version: '1.0.0'
config-version: 2

profile: 'fhir_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

packages:
  - package: dbt-labs/dbt_utils
    version: 1.1.1
  - package: calogica/dbt_expectations
    version: 0.10.3

models:
  fhir_analytics:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging", "fhir"]

    intermediate:
      +materialized: table
      +schema: intermediate
      +tags: ["intermediate"]
      # Spine rebuilt daily — can be incremental if patient volume grows
      int_patient_spine:
        +materialized: table
        +post-hook: "analyze table {{ this }}"

    marts:
      +materialized: table
      +schema: analytics
      +tags: ["mart", "analytics"]
      mart_care_gaps:
        +tags: ["care_gaps", "clinical"]
      mart_population_health:
        +tags: ["population_health"]
      mart_utilization:
        +tags: ["utilization"]

seeds:
  fhir_analytics:
    icd10_chronic_conditions:
      +column_types:
        icd10_code: varchar(10)
        condition_name: varchar(200)
        condition_category: varchar(50)

vars:
  # Care gap thresholds (days) — adjust per customer contract
  diabetes_gap_days: 365
  hypertension_gap_days: 365
  depression_screening_gap_days: 365

  # Lookback window for encounter-based features
  encounter_lookback_months: 12
