version: 2

models:
  - name: mart_care_gaps
    description: >
      One row per patient per qualifying condition type. Identifies patients
      who have a clinical care gap (overdue measurement) based on HEDIS-adjacent
      definitions. Primary input to the care gap prediction model and outreach
      prioritization dashboard.
    columns:
      - name: care_gap_id
        description: "Surrogate key: hash of (patient_id, condition_type)"
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_fhir__patients')
              field: patient_id
      - name: condition_type
        tests:
          - not_null
          - accepted_values:
              values: ['diabetes', 'hypertension', 'depression_screening']
      - name: gap_flag
        description: "TRUE if patient has an open care gap (measurement overdue)"
        tests:
          - not_null
      - name: risk_tier
        tests:
          - accepted_values:
              values: ['critical', 'high', 'medium', 'low']
      - name: days_since_gap_obs
        description: "Days since the most recent qualifying observation. 9999 = never measured."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 10000

  - name: mart_utilization
    description: >
      Patient-level ED and inpatient utilization KPIs for the trailing 12 months.
      Includes population percentile flags for anomaly detection (super-utilizers).
      Powers the utilization dashboard and feeds the care gap ML model.
    columns:
      - name: patient_id
        tests:
          - unique
          - not_null
      - name: utilization_tier
        tests:
          - accepted_values:
              values: ['super_utilizer', 'high_utilizer', 'moderate_utilizer', 'low_utilizer', 'no_ed_visits']
      - name: ed_visits_zscore
        description: "Z-score of ED visits vs population. >2.5 = statistical outlier."

  - name: mart_population_health
    description: >
      Cohort-level population health KPIs aggregated by (state, condition_type,
      urban_rural_classification). Powers the self-service analytics dashboard
      for Metriport customers. Includes ROLLUP rows (state='ALL') for totals.
    columns:
      - name: cohort_id
        tests:
          - unique
          - not_null
      - name: gap_rate
        description: "Fraction of cohort patients with an open care gap (0.0–1.0)"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
      - name: patient_count
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000000
